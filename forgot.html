<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f9f9f9; }
        .forgot-container { max-width: 350px; margin: 60px auto; padding: 20px; background: #fff; border-radius: 4px; border: 1px solid #ccc; }
        h2 { text-align: center; color: #007bff; }
        label { display: block; margin: 10px 0 5px; }
        input[type="email"] { width: 100%; padding: 6px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 8px; background: #007bff; color: #fff; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
        .error { color: #d8000c; background: #ffd2d2; padding: 8px; border-radius: 4px; margin-bottom: 10px; display: none; }
    </style>
</head>
<body>
    <div class="forgot-container">
        <h2>Forgot Password</h2>
        <div id="forgot-feedback" class="error"></div>
        <form id="forgot-form" onsubmit="return checkEmail();">
            <label for="email">Email Address:</label>
            <input type="email" id="email" name="email" required>
            <button type="submit">Reset Password</button>
        </form>
    </div>
    <script src="forgot.js"></script>
</body>
</html>
