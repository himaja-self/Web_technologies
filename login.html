<!doctype html>
<html>
  <head>
    <title>Login</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f9f9f9;
      }
      .login-container {
        max-width: 350px;
        margin: 60px auto;
        padding: 30px;
        background: #fff;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }
      h2 {
        text-align: center;
        color: #007bff;
      }
      label {
        display: block;
        margin: 15px 0 5px;
      }
      input[type="text"],
      input[type="password"],
      input[type="email"] {
        width: 100%;
        padding: 8px;
        margin-bottom: 15px;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      button {
        width: 100%;
        padding: 10px;
        background: #007bff;
        color: #fff;
        border: none;
        border-radius: 4px;
        font-size: 16px;
        cursor: pointer;
      }
      button:hover {
        background: #0056b3;
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <h2>Login</h2>
      <form>
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" required />
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required />
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required />
        <button type="submit">Login</button>
      </form>
      <script>
        document.querySelector('form').onsubmit = function(e) {
          e.preventDefault();
          var username = document.getElementById('username').value.trim();
          if (username) {
            localStorage.setItem('username', username);
            // Reload only the header frame
            if (parent && parent.frames && parent.frames['top']) {
              parent.frames['top'].location.reload();
            }
            // Redirect to main page
            if (parent && parent.frames && parent.frames['main']) {
              parent.frames['main'].location.href = 'main.html';
            }
          }
        };
      </script>
      <div style="text-align: center; margin-top: 10px">
        <a
          href="forgot.html"
          target="main"
          style="color: #007bff; text-decoration: none; font-size: 15px"
          >Forgot Password?</a
        >
      </div>
    </div>
  </body>
</html>
