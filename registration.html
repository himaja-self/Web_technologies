<!DOCTYPE html>
<html>
<head>
    <title>Registration</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background: #f9f9f9; }
        .reg-container { max-width: 400px; margin: 40px auto; padding: 30px; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        h2 { text-align: center; color: #007bff; }
        label { display: block; margin: 15px 0 5px; }
        input[type="text"], input[type="email"], input[type="password"] { width: 100%; padding: 8px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 10px; background: #007bff; color: #fff; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .error { color: #d8000c; background: #ffd2d2; padding: 10px; border-radius: 4px; margin-bottom: 10px; display: none; }
    </style>
</head>
<body>
    <div class="reg-container">
        <h2>Registration</h2>
        <div id="reg-errors" class="error"></div>
        <form id="registration-form" onsubmit="return checkPasswords();">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required minlength="5">
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required minlength="8">
            <label for="confirm_password">Confirm Password:</label>
            <input type="password" id="confirm_password" name="confirm_password" required minlength="8">
            <button type="submit">Register</button>
        </form>
    </div>
</body>
<script>
function checkPasswords() {
    var password = document.getElementById('password').value;
    var confirmPassword = document.getElementById('confirm_password').value;
    var errorDiv = document.getElementById('reg-errors');
    if (password !== confirmPassword) {
        errorDiv.innerHTML = 'Passwords do not match.';
        errorDiv.style.display = 'block';
        return false;
    }
    errorDiv.style.display = 'none';
    alert('Registration successful!');
    return true;
}
</script>
</body>
</html>
